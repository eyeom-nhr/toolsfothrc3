}

function DesignCard({p,images}){const mc=MC[p.m],raw=images[p.id],th=raw?"data:image/jpeg;base64,"+raw:null;return(<div style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:14,overflow:"hidden",marginBottom:24,pageBreakInside:"avoid"}}><div style={{background:mc.p,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:800,color:"#fff"}}>{p.m} &rsaquo; {CI[p.c]} {p.c}</span><span style={{fontSize:16,fontWeight:900,color:"#fff"}}>{p.n}</span></div>{th&&<div style={{background:"#f8f8f8",padding:20,borderBottom:"1px solid #eee"}}><div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:10,letterSpacing:1}}>PREVIEW</div><img src={th} alt={p.n} style={{width:"100%",maxWidth:780,borderRadius:10,border:"1px solid #ddd"}}/></div>}<div style={{padding:20}}><div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:12,letterSpacing:1}}>SPEC</div><div style={{fontSize:12,color:"#555",marginBottom:8}}><span style={{color:"#999",marginRight:8}}>노출</span>{p.pl}</div>{p.si?.filter(x=>x.w).map((x,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:14,marginBottom:10,padding:"10px 16px",background:"#f8f9fc",borderRadius:10}}><Ratio w={x.w} h={x.h} color={mc.p}/><div><div style={{fontSize:16,fontWeight:900,fontFamily:"monospace"}}>{x.w} x {x.h} <span style={{fontSize:11,color:"#aaa"}}>px</span></div><div style={{fontSize:11,color:"#888",marginTop:2}}>{x.l}{x.nt?" - "+x.nt:""}</div></div></div>)}{p.si?.filter(x=>!x.w&&x.nt).map((x,i)=><div key={"n"+i} style={{fontSize:13,color:"#555",padding:"10px 16px",background:"#f8f9fc",borderRadius:10,marginBottom:8}}><b>{x.l}:</b> {x.nt}</div>)}{p.st&&<div style={{fontSize:12,color:"#555",marginBottom:6}}><span style={{color:"#999",marginRight:8}}>텍스트</span>{p.st}</div>}{p.su&&<div style={{fontSize:12,color:"#555",marginBottom:6}}><span style={{color:"#999",marginRight:8}}>URL</span>{p.su}</div>}{p.sv&&<div style={{fontSize:12,color:"#555",marginBottom:6}}><span style={{color:"#999",marginRight:8}}>영상</span>{p.sv}</div>}{p.dn&&<div style={{marginTop:12,padding:"12px 16px",background:"#FFF8E1",borderRadius:10,fontSize:12.5,color:"#795548"}}>{"💡 "+p.dn}</div>}</div></div>)}
function DesignerView({sel,cn,onClose,images}){const now=new Date(),dt=now.getFullYear()+"."+String(now.getMonth()+1).padStart(2,"0")+"."+String(now.getDate()).padStart(2,"0");const ti=sel.reduce((a,p)=>a+(p.si?p.si.filter(x=>x.w).length:0),0);return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#f0f1f4",zIndex:200,overflowY:"auto"}}><div className="noprint" style={{background:"#1a1a2e",padding:"16px 28px",position:"sticky",top:0,zIndex:10,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}><div><div style={{fontSize:18,fontWeight:900,color:"#fff"}}>디자이너 소재 가이드</div><div style={{fontSize:12,color:"#a0b4c8",marginTop:2}}>{cn||"(미정)"} / {dt} / {sel.length}건 / 이미지 {ti}점</div></div><div style={{display:"flex",gap:10}}><button onClick={()=>window.print()} style={{padding:"8px 18px",borderRadius:8,border:"1px solid rgba(255,255,255,.2)",background:"transparent",color:"#fff",fontSize:12,fontWeight:700}}>🖨️</button><button onClick={onClose} style={{padding:"8px 18px",borderRadius:8,border:"none",background:"#e53935",color:"#fff",fontSize:12,fontWeight:700}}>닫기</button></div></div><div style={{maxWidth:860,margin:"24px auto",padding:"0 20px 60px"}}><div style={{background:"#fff",borderRadius:14,padding:24,marginBottom:28,border:"1px solid #e0e0e0"}}><div style={{fontSize:15,fontWeight:800,marginBottom:16}}>제작 요약</div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}><div style={{textAlign:"center",padding:16,background:"#f8f8fc",borderRadius:12}}><div style={{fontSize:28,fontWeight:900,color:"#1B6EC2"}}>{ti}</div><div style={{fontSize:11,color:"#888",marginTop:4}}>이미지 수</div></div><div style={{textAlign:"center",padding:16,background:"#f8f8fc",borderRadius:12}}><div style={{fontSize:28,fontWeight:900,color:"#F26A21"}}>{sel.filter(p=>p.si?.some(x=>x.w&&x.w===x.h)).length}</div><div style={{fontSize:11,color:"#888",marginTop:4}}>정사각형</div></div><div style={{textAlign:"center",padding:16,background:"#f8f8fc",borderRadius:12}}><div style={{fontSize:28,fontWeight:900,color:"#795548"}}>{sel.filter(p=>p.si&&p.si.length>1).length}</div><div style={{fontSize:11,color:"#888",marginTop:4}}>2종 이상</div></div></div></div>{sel.map(p=><DesignCard key={p.id} p={p} images={images}/>)}</div></div>)}
function App(){
  /* URL params: ?ids=ct_splash,ct_big&cn=캠페인명&view=designer */
  const params=new URLSearchParams(window.location.search);
  const urlIds=params.get("ids");
  const urlCn=params.get("cn")||"";
  const urlView=params.get("view");
  const initSel=urlIds?new Set(urlIds.split(",").filter(id=>P.some(p=>p.id===id))):new Set();

  const[sel,setSel]=useState(initSel);
  const[cn,setCn]=useState(urlCn);
  const[am,setAm]=useState("전체");
  const[ac,setAc]=useState("전체");
  const[dv,setDv]=useState(urlView==="designer"&&initSel.size>0);
  const[images,setImages]=useState({});
  const[imgSt,setImgSt]=useState("empty");
  const[cp,setCp]=useState(false);
  const[linkCp,setLinkCp]=useState(false);

  const tog=id=>setSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n});
  const aCats=useMemo(()=>[...new Set((am==="전체"?P:P.filter(p=>p.m===am)).map(p=>p.c))],[am]);
  const filt=useMemo(()=>P.filter(p=>(am==="전체"||p.m===am)&&(ac==="전체"||p.c===ac)),[am,ac]);
  const selP=P.filter(p=>sel.has(p.id));
  const grp=useMemo(()=>{const g={};filt.forEach(p=>{const k=p.m+"|||"+p.c;if(!g[k])g[k]={m:p.m,c:p.c,ps:[]};g[k].ps.push(p)});return Object.values(g)},[filt]);

  React.useEffect(()=>{setImgSt("loading");fetch("ad-thumbnails.json").then(r=>{if(!r.ok)throw new Error();return r.json()}).then(d=>{setImages(d);setImgSt("loaded")}).catch(()=>{setImgSt("empty")})},[]);

  const handleImg=useCallback(e=>{const f=e.target.files?.[0];if(!f)return;setImgSt("loading");const r=new FileReader();r.onload=ev=>{try{setImages(prev=>({...prev,...JSON.parse(ev.target.result)}));setImgSt("loaded")}catch(err){setImgSt("error")}};r.readAsText(f)},[]);

  /* Generate shareable URL */
  const makeLink=useCallback((view)=>{
    if(!selP.length)return"";
    const base=window.location.origin+window.location.pathname;
    const ids=selP.map(p=>p.id).join(",");
    const p=new URLSearchParams();
    p.set("ids",ids);
    if(cn)p.set("cn",cn);
    if(view)p.set("view",view);
    return base+"?"+p.toString();
  },[selP,cn]);

  const copyLink=useCallback((view)=>{
    const url=makeLink(view);
    if(!url)return;
    navigator.clipboard.writeText(url).then(()=>{setLinkCp(true);setTimeout(()=>setLinkCp(false),2000)});
  },[makeLink]);

  const txt=useMemo(()=>{
    if(!selP.length)return"";
    const dt=new Date();const d=dt.getFullYear()+"."+String(dt.getMonth()+1).padStart(2,"0")+"."+String(dt.getDate()).padStart(2,"0");
    const L=["======================================","  광고 소재 제작 요청서","======================================","","캠페인: "+(cn||"(미정)"),"요청일: "+d,"선택: "+selP.length+"건",""];
    const bm={};selP.forEach(p=>{if(!bm[p.m])bm[p.m]={};if(!bm[p.m][p.c])bm[p.m][p.c]=[];bm[p.m][p.c].push(p)});
    Object.entries(bm).forEach(([media,cats])=>{L.push("--- "+media+" ---");L.push("");
      Object.entries(cats).forEach(([cat,ps])=>{L.push((CI[cat]||"")+" "+cat);L.push("");
        ps.forEach((p,i)=>{L.push("  "+(i+1)+". "+p.n);L.push("     노출: "+p.pl);
          p.si.forEach(im=>{if(im.w)L.push("     "+im.l+": "+im.w+" x "+im.h+" px"+(im.nt?" ("+im.nt+")":""));else if(im.nt)L.push("     "+im.l+": "+im.nt)});
          if(p.sv)L.push("     영상: "+p.sv);if(p.st)L.push("     텍스트: "+p.st);if(p.su)L.push("     URL: "+p.su);if(p.dn)L.push("     참고: "+p.dn);L.push("")})})});
    L.push("======================================");
    const link=makeLink("designer");
    if(link){L.push("");L.push("디자이너 가이드 (예시 이미지 포함):");L.push(link)}
    return L.join("\n");
  },[selP,cn,makeLink]);

return(<div>
  {dv&&selP.length>0&&<DesignerView sel={selP} cn={cn} onClose={()=>{setDv(false);/* clean URL */if(urlView)window.history.replaceState(null,"",window.location.pathname)}} images={images}/>}
  <div className="noprint" style={{background:"linear-gradient(135deg,#1a1a2e,#0f3460)",padding:"22px 28px 18px",color:"#fff"}}>
    <div style={{maxWidth:1320,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:10}}>
      <div><div style={{fontSize:11,fontWeight:700,color:"#53c6c6",letterSpacing:2,marginBottom:4}}>AD SPEC GENERATOR</div><div style={{fontSize:20,fontWeight:900}}>광고 소재 규격 자동 생성기</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.08)",padding:"6px 14px",borderRadius:10}}><span style={{fontSize:12,color:"#a0b4c8"}}>선택</span><span style={{fontSize:22,fontWeight:900,color:"#53c6c6",fontFamily:"monospace"}}>{sel.size}</span><span style={{fontSize:12,color:"#a0b4c8"}}>/ {P.length}</span></div>
    </div>
  </div>
  <div className="noprint" style={{background:"#fff",borderBottom:"1px solid #e8e8e8",padding:"10px 28px",position:"sticky",top:0,zIndex:10}}>
    <div style={{maxWidth:1320,margin:"0 auto"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
        <span style={{fontSize:11,fontWeight:700,color:"#aaa",lineHeight:"28px"}}>매체</span>
        {["전체","커리어톡","자소설닷컴"].map(m=><button key={m} onClick={()=>{setAm(m);setAc("전체")}} style={{padding:"4px 14px",borderRadius:18,border:am===m?"2px solid #1a1a2e":"1.5px solid #ddd",background:am===m?"#1a1a2e":"#fff",color:am===m?"#fff":"#555",fontSize:12.5,fontWeight:700}}>{m}</button>)}
        {sel.size>0&&<button onClick={()=>setSel(new Set())} style={{marginLeft:"auto",padding:"4px 12px",borderRadius:7,border:"1.5px solid #e53935",background:"#fff",color:"#e53935",fontSize:11,fontWeight:700}}>초기화</button>}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#aaa",lineHeight:"26px"}}>유형</span>
        {["전체",...aCats].map(c=><button key={c} onClick={()=>setAc(c)} style={{padding:"3px 11px",borderRadius:14,border:ac===c?"1.5px solid #666":"1px solid #e0e0e0",background:ac===c?"#f0f0f0":"#fff",color:ac===c?"#333":"#888",fontSize:11.5,fontWeight:600}}>{c!=="전체"?(CI[c]||"")+" ":""}{c}</button>)}
      </div>
    </div>
  </div>
  <div style={{maxWidth:1320,margin:"0 auto",padding:"20px 28px",display:"grid",gridTemplateColumns:"1fr 380px",gap:24,alignItems:"start"}}>
    <div className="noprint">{grp.map(g=><div key={g.m+g.c} style={{marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:5,background:MC[g.m].p,color:"#fff"}}>{g.m}</span>
        <span style={{fontSize:14,fontWeight:800}}>{CI[g.c]} {g.c}</span>
        <span style={{fontSize:11,color:"#aaa"}}>({g.ps.length})</span>
        <button onClick={()=>{const ids=g.ps.map(p=>p.id);setSel(prev=>{const n=new Set(prev);const all=ids.every(id=>n.has(id));ids.forEach(id=>all?n.delete(id):n.add(id));return n})}} style={{marginLeft:"auto",padding:"3px 10px",borderRadius:6,border:"1px solid "+MC[g.m].p,background:"#fff",color:MC[g.m].p,fontSize:11,fontWeight:700}}>{g.ps.every(p=>sel.has(p.id))?"해제":"전체선택"}</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>{g.ps.map(p=><Card key={p.id} p={p} sel={sel.has(p.id)} onTog={()=>tog(p.id)}/>)}</div>
    </div>)}</div>
    <div className="noprint" style={{position:"sticky",top:96,background:"#fff",borderRadius:14,border:"1px solid #e0e0e0",padding:16}}>
      <div style={{fontSize:13,fontWeight:800,marginBottom:14}}>📄 디자인팀 요청서</div>
      {imgSt==="loaded"?<div style={{padding:"8px 14px",background:"#f0faf0",borderRadius:8,fontSize:12,color:"#2e7d32",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span>✅ 이미지 {Object.keys(images).length}개 자동 로드</span><button onClick={()=>{setImages({});setImgSt("empty")}} style={{fontSize:11,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>초기화</button></div>
      :imgSt==="loading"?<div style={{padding:"12px 14px",background:"#E8F4FD",borderRadius:8,fontSize:12,color:"#1B6EC2",marginBottom:12}}>이미지 로딩 중...</div>
      :<div style={{padding:16,background:"#FFF8E1",borderRadius:10,marginBottom:16,border:"1px dashed #F9A825"}}><div style={{fontSize:13,fontWeight:700,color:"#795548",marginBottom:8}}>📸 예시 이미지</div><div style={{fontSize:12,color:"#999",marginBottom:10}}>같은 폴더에 ad-thumbnails.json이 없으면 수동 선택</div><input type="file" accept=".json" onChange={handleImg} style={{fontSize:12}}/></div>}
      {!selP.length?<div style={{textAlign:"center",padding:"50px 20px",color:"#bbb"}}><div style={{fontSize:44,marginBottom:12,opacity:.35}}>📋</div><div style={{fontWeight:600,color:"#999"}}>상품을 선택해주세요</div></div>
      :<div>
        <div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,fontWeight:700,color:"#999",marginBottom:5}}>캠페인명</label><input type="text" value={cn} onChange={e=>setCn(e.target.value)} placeholder="예: 2025 하반기 공채" style={{width:"100%",padding:"9px 12px",border:"2px solid #e0e0e0",borderRadius:9,fontSize:13.5,fontWeight:600,outline:"none",boxSizing:"border-box"}}/></div>
        <button onClick={()=>setDv(true)} style={{width:"100%",padding:14,borderRadius:10,border:"2px solid #1B6EC2",background:"#E8F4FD",color:"#1B6EC2",fontSize:14,fontWeight:800,marginBottom:10}}>📐 디자이너 가이드 열기</button>
        <button onClick={()=>copyLink("designer")} style={{width:"100%",padding:12,borderRadius:10,border:"2px solid #F26A21",background:linkCp?"#4CAF50":"#FFF3E8",color:linkCp?"#fff":"#F26A21",fontSize:13,fontWeight:800,marginBottom:14,transition:"all .2s"}}>{linkCp?"✓ 링크 복사됨!":"🔗 디자이너 가이드 링크 복사 (예시 이미지 포함)"}</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12.5,fontWeight:700,color:"#555"}}>선택 <span style={{color:"#1B6EC2"}}>{selP.length}</span>건</span>
          <button onClick={()=>{navigator.clipboard.writeText(txt).then(()=>{setCp(true);setTimeout(()=>setCp(false),2000)})}} style={{padding:"7px 16px",borderRadius:7,border:"none",background:cp?"#4CAF50":"#1a1a2e",color:"#fff",fontSize:12.5,fontWeight:700}}>{cp?"복사됨!":"📋 텍스트 복사"}</button>
        </div>
        <pre style={{background:"#1a1a2e",color:"#e0e0e0",padding:16,borderRadius:10,fontSize:11.5,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"calc(100vh - 500px)",overflowY:"auto",fontFamily:"monospace"}}>{txt}</pre>
      </div>}
    </div>
  </div>
</div>)}
ReactDOM.createRoot(document.getElementById('root')).render(<AuthWrapper/>);
</script>
</body>
</html>
